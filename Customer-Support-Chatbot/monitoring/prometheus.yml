global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "chatbot"
    static_configs:
      - targets: ["chatbot:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "elasticsearch"
    static_configs:
      - targets: ["elasticsearch:9200"]
    metrics_path: "/_prometheus/metrics"

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]